<!DOCTYPE html>
<!--
  fire_advisor_updated.html
  ==========================
  WealthSutra AI — Single-Page Frontend

  This file is the complete client-side application for WealthSutra AI.
  It is served by the FastAPI backend (app.py) at the root "/" route.

  Structure:
    <head>  — External CDN scripts (Chart.js), Google Fonts, and all CSS styles.
    <body>  — Sticky navigation bar + four page sections:
                1. #page-profile  : Profile input form
                2. #page-score    : Financial health score cards
                3. #page-fire     : FIRE corpus projection
                4. #page-chat     : AI chat interface
    <script>— All JavaScript logic:
                • Scoring functions (emergencyScore, debtScore, …)
                • API calls to the FastAPI backend (/analyze, /chat)
                • UI rendering helpers (fmt, fmtNum, updateScoreUI, …)
                • Chat initialization and message handling
-->
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js">

// ── WRAPPER (ADDED) ───────────────────────────────────
function renderUI(data) {
  if (data && data.score) {
    const total = data.score.total;
    document.getElementById('scoreHero').innerHTML =
      `<h2>Money Health Score: ${total}/100</h2>`;
  }
  analyzeProfileOld(profile);
}

// ── ORIGINAL UI LOGIC WRAPPED ─────────────────────────
function analyzeProfileOld(profileInput) {
  const age = profileInput.age;
  const income = profileInput.income;
  const expenses = profileInput.expenses;
  const savings = profileInput.savings;
  const investments = profileInput.investments;
  const debt = profileInput.debt;
  const emi = profileInput.emi;
  const insurance = profileInput.insurance;
  const risk = profileInput.risk;
  const retireAge = profileInput.retireAge;

  profile = profileInput;

  const cats = [
    { name: 'Emergency Fund', icon: '🛡️', ...emergencyScore(savings, expenses) },
    { name: 'Debt Health', icon: '💳', ...debtScore(emi, income) },
    { name: 'Savings Rate', icon: '📈', ...savingsScore(investments, income) },
    { name: 'Insurance', icon: '☂️', ...insuranceScore(insurance) },
    { name: 'Investments', icon: '🏦', ...investmentScore(investments, income, risk) },
    { name: 'Retirement', icon: '🎯', ...retirementScore(age, retireAge, investments, income) },
  ];

  const total = Math.round(cats.reduce((a, c) => a + c.s, 0) / cats.length);

  document.getElementById('scoreHero').innerHTML = `<h2>Money Health Score: ${total}/100</h2>`;

  document.getElementById('catsGrid').innerHTML = cats.map(c => `
    <div class="cat-card">
      <div class="cat-top">
        <span class="cat-name">${c.icon} ${c.name}</span>
        <span class="cat-score">${c.s}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${c.s}%"></div></div>
      <div class="cat-msg">${c.msg}</div>
    </div>
  `).join('');

  document.getElementById('suggestionsBox').innerHTML = `<h3>🎯 Suggestions</h3>`;

  updateFIRE();

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-score').classList.add('active');
}

</script>

<script>
// ── STATE ──────────────────────────────────────────────
// Global object that stores the user's current financial profile after analysis.
let profile = {};
// Array that tracks the conversation history for the AI chat feature.
let chatHistory = [];

// ── NAVIGATION ─────────────────────────────────────────
/**
 * Switch the visible page section and highlight the corresponding nav tab.
 * @param {string} id - The page identifier suffix (e.g. "score", "fire", "chat").
 */
function showPage(id) {
  // Hide all pages, then activate only the requested one
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  // Remove active styling from all nav tabs, then highlight the clicked one
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── SCORE LOGIC ────────────────────────────────────────
/**
 * Calculate the emergency-fund pillar score.
 * A healthy emergency fund should cover at least 6 months of expenses.
 * @param {number} savings - Total liquid savings (₹).
 * @param {number} expense - Monthly expenses (₹).
 * @returns {{ s: number, msg: string }} Score (0-100) and a human-readable message.
 */
function emergencyScore(savings, expense) {
  // Months of expenses covered by current savings
  const m = savings / Math.max(expense, 1);
  if (m >= 6) return { s: 100, msg: `You have ${m.toFixed(1)} months covered. Excellent!` };
  if (m >= 3) return { s: 70, msg: `${m.toFixed(1)} months covered. Aim for 6 months.` };
  return { s: 40, msg: `Only ${m.toFixed(1)} months covered. Build your emergency fund first.` };
}

/**
 * Calculate the debt-health pillar score based on the EMI-to-income ratio.
 * A ratio above 30% is considered high-risk.
 * @param {number} emi    - Monthly EMI obligation (₹).
 * @param {number} income - Monthly gross income (₹).
 * @returns {{ s: number, msg: string }} Score (0-100) and a human-readable message.
 */
function debtScore(emi, income) {
  const ratio = emi / Math.max(income, 1);
  if (ratio === 0) return { s: 100, msg: 'Debt-free! Great financial health.' };
  if (ratio <= 0.2) return { s: 90, msg: `EMI is ${(ratio*100).toFixed(0)}% of income. Well within limits.` };
  if (ratio <= 0.3) return { s: 65, msg: `EMI is ${(ratio*100).toFixed(0)}% of income. Manageable, but watch this.` };
  return { s: 30, msg: `EMI is ${(ratio*100).toFixed(0)}% of income. Critical — reduce debt urgently.` };
}

/**
 * Calculate the savings-rate pillar score.
 * Saving ≥20% of income monthly is the recommended target.
 * @param {number} investments - Monthly investment / SIP amount (₹).
 * @param {number} income      - Monthly gross income (₹).
 * @returns {{ s: number, msg: string }} Score (0-100) and a human-readable message.
 */
function savingsScore(investments, income) {
  const rate = investments / Math.max(income, 1);
  if (rate >= 0.3) return { s: 100, msg: `Saving ${(rate*100).toFixed(0)}% of income. Superstar saver!` };
  if (rate >= 0.2) return { s: 80, msg: `Saving ${(rate*100).toFixed(0)}% of income. On track!` };
  if (rate >= 0.1) return { s: 55, msg: `Saving ${(rate*100).toFixed(0)}%. Increase SIP by ₹${Math.round((0.2*income-investments)/1000)*1000} to hit 20%.` };
  return { s: 30, msg: `Saving only ${(rate*100).toFixed(0)}% of income. Start a SIP today.` };
}

/**
 * Calculate the insurance pillar score based on coverage type.
 * Full marks are only awarded when both term life and health insurance are held.
 * @param {string} type - Coverage type: "none" | "health" | "term" | "both".
 * @returns {{ s: number, msg: string }} Score (0-100) and a human-readable message.
 */
function insuranceScore(type) {
  // Lookup table mapping coverage type to score + advice message
  const map = { none: { s:10, msg:'No insurance is a serious risk. Get term + health cover ASAP.' }, health: { s:50, msg:'Health cover is good. Add a term plan to protect your family.' }, term: { s:60, msg:'Term plan is good. Add health insurance to cover medical costs.' }, both: { s:100, msg:'Complete coverage with term + health. Well protected!' } };
  return map[type] || map.none;
}

/**
 * Calculate the investment-habit pillar score.
 * A higher risk appetite raises the score ceiling, rewarding diversified investing.
 * @param {number} investments - Monthly investment / SIP amount (₹).
 * @param {number} income      - Monthly gross income (₹).
 * @param {string} risk        - Risk appetite: "conservative" | "moderate" | "aggressive".
 * @returns {{ s: number, msg: string }} Score (0-100) and a human-readable message.
 */
function investmentScore(investments, income, risk) {
  const rate = investments / Math.max(income, 1);
  // Base score derived from the investment rate threshold
  let base = rate >= 0.15 ? 80 : rate >= 0.1 ? 60 : 40;
  // Boost the score for users willing to take higher risk
  if (risk === 'moderate') base = Math.min(base + 10, 100);
  if (risk === 'aggressive') base = Math.min(base + 20, 100);
  return { s: base, msg: rate >= 0.15 ? 'Good investment habit. Consider diversifying into equity + debt.' : `Invest more: aim for at least ₹${Math.round(0.15*income/1000)*1000}/month.` };
}

/**
 * Calculate the retirement-readiness pillar score.
 * Score combines years remaining until retirement with the current investment rate.
 * Weighted formula: time horizon contributes 50% and investment rate 150%.
 * @param {number} age         - User's current age (years).
 * @param {number} retireAge   - Target retirement age (years).
 * @param {number} investments - Monthly investment / SIP amount (₹).
 * @param {number} income      - Monthly gross income (₹).
 * @returns {{ s: number, msg: string }} Score (0-100) and a human-readable message.
 */
function retirementScore(age, retireAge, investments, income) {
  const years = retireAge - age;  // Investment horizon
  if (years <= 0) return { s: 50, msg: 'Already at retirement age.' };
  const rate = investments / Math.max(income, 1);
  // Weighted formula: time horizon contributes 50 % and investment rate 150 %
  const score = Math.min(100, Math.round((years / 30) * 50 + rate * 150));
  return { s: score, msg: score > 70 ? 'Great retirement trajectory!' : `Start investing more aggressively to hit your FIRE goal by ${retireAge}.` };
}

/**
 * Return the CSS colour variable appropriate for a given score.
 * Green (80+), amber (55+), or red (below 55).
 * @param {number} s - Score value (0-100).
 * @returns {string} CSS custom property string.
 */
function getColor(s) {
  if (s >= 80) return 'var(--accent2)';
  if (s >= 55) return 'var(--accent)';
  return 'var(--danger)';
}

/**
 * Return a badge label and CSS class for the overall financial health score.
 * @param {number} total - Overall score (0-100).
 * @returns {[string, string]} Tuple of [label, cssClass].
 */
function getBadge(total) {
  if (total >= 80) return ['Excellent', 'tag-green'];
  if (total >= 60) return ['Good', 'tag-amber'];
  if (total >= 40) return ['Needs Work', 'tag-amber'];
  return ['Critical', 'tag-red'];
}

/**
 * Format a rupee amount into a compact Indian notation (Crores / Lakhs).
 * @param {number} n - Amount in rupees.
 * @returns {string} Formatted string, e.g. "₹1.25 Cr" or "₹5.00 L".
 */
function fmt(n) {
  if (n >= 1e7) return '₹' + (n/1e7).toFixed(2) + ' Cr';  // Crores
  if (n >= 1e5) return '₹' + (n/1e5).toFixed(2) + ' L';   // Lakhs
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

/**
 * Format a number using the Indian locale (e.g. 1,00,000).
 * @param {number} n - Number to format.
 * @returns {string} Locale-formatted string.
 */
function fmtNum(n) { return Math.round(n).toLocaleString('en-IN'); }

/**
 * Run the full client-side analysis using a supplied profile object.
 * Computes all six pillar scores locally, renders the score cards, and
 * navigates to the score page. Also triggers the FIRE projection update.
 * @param {{ age, income, expenses, savings, investments, debt, emi,
 *           insurance, risk, retireAge }} profileInput - User's financial profile.
 */
function analyzeProfileOld(profileInput) {
  // Destructure the profile for convenience
  const age = profileInput.age;
  const income = profileInput.income;
  const expenses = profileInput.expenses;
  const savings = profileInput.savings;
  const investments = profileInput.investments;
  const debt = profileInput.debt;
  const emi = profileInput.emi;
  const insurance = profileInput.insurance;
  const risk = profileInput.risk;
  const retireAge = profileInput.retireAge;

  // Save to global state so other functions (e.g. chat) can access it
  profile = profileInput;

  // Build the category array by running each pillar scoring function
  const cats = [
    { name: 'Emergency Fund', icon: '🛡️', ...emergencyScore(savings, expenses) },
    { name: 'Debt Health', icon: '💳', ...debtScore(emi, income) },
    { name: 'Savings Rate', icon: '📈', ...savingsScore(investments, income) },
    { name: 'Insurance', icon: '☂️', ...insuranceScore(insurance) },
    { name: 'Investments', icon: '🏦', ...investmentScore(investments, income, risk) },
    { name: 'Retirement', icon: '🎯', ...retirementScore(age, retireAge, investments, income) },
  ];

  // Overall score is the integer average of all six pillar scores
  const total = Math.round(cats.reduce((a, c) => a + c.s, 0) / cats.length);

  document.getElementById('scoreHero').innerHTML = `<h2>Money Health Score: ${total}/100</h2>`;

  // Render individual category cards with a progress bar and advice message
  document.getElementById('catsGrid').innerHTML = cats.map(c => `
    <div class="cat-card">
      <div class="cat-top">
        <span class="cat-name">${c.icon} ${c.name}</span>
        <span class="cat-score">${c.s}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${c.s}%"></div></div>
      <div class="cat-msg">${c.msg}</div>
    </div>
  `).join('');

  // Placeholder heading for the suggestions section (AI fills this via /analyze)
  document.getElementById('suggestionsBox').innerHTML = `<h3>🎯 Suggestions</h3>`;

  // Refresh the FIRE projection panel
  updateFIRE();

  // Navigate to the score results page
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-score').classList.add('active');
}
